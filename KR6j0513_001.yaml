body:
  text: 爾時三十三天主摩醯首羅天王共諸天女眾讚寶藏天王名吒羅佉有大威德色力無比能於世間行殊勝事迴天動地傾山覆海兵戈勝負志意而成財帛金寶積如山岳世間受用即說呪曰唵吒羅佉吒羅佉毘多羅儞莎嚩訶若欲受持此法先畫一天女形泥檀法五月五日前七日喫希粥長齋意欲去處須淨潔也凡行此法天女不喚自來然須思存用表至誠此法必須五月五日夜受持即果成就五月五日夜注想思存換換誦呪一千八遍不得急至三更即心昏似睡天女使諸女來令相試弄必莫共語至第二遍其天女吒羅佉自來相見其作法人不得赴便䠒跪合掌頂禮兩拜即相問之有何所須其作法人隨口答之乞好藥長生不死通靈世間萬事之情終身奉事天女意生欲為夫妻天女聞已甚大歡喜當夜便與交諸願如意若欲作姊妹於事必須分明勿生狐疑其壇法二肘半量用牛糞泥地更以香泥塗地五色彩畫又五色綵各二尺一寸在壇內安天女座酥密乳等菓子各一盤五色花餅各五枚已雜栗麥燒花隨意供養其畫像法天女身長二尺五寸頭作花冠所點花極妙端正身著紫袍金帶烏靴右手把蓮花左手把如意寶珠其天女端正光明世間畫師無能畫者必須好手不得論價應時通靈心神自在財帛盈溢官位高遷中一切禍福了達貴賤男女皆悉歡喜凡有所動一切鬼神皆來迎待如敬天官悚懼瞻仰便得無礙乃至世間好妙藝隨意而成有惡來相害者便呼賊各皆得自縛自打言放即放世間走失死亡如驗目前萬病舉意持之皆差又八真言各須清淨沐浴著新淨衣於佛前形像前各誦三七遍然後作法第一真言唵興婆羅帝吒急急娑嚩二合賀第二真言唵拔羅帝吒唎摩那羅娑嚩賀第三真言唵勒叉那帝吒娑吒娑嚩二合賀第四真言唵婆婆隷若帝吒娑嚩二合賀第五真言唵勃惹羅帝吒娑嚩二合賀第六真言唵藥叉藥叉底那婆娑嚩二合賀第七真言唵遮帝毘折曳吽泮吒娑嚩二合賀第八真言唵折勒那耶利婆帝吒娑嚩二合賀以中指無名指屈以大母指押二指甲舒頭指及小指安心上右手把數珠念真言此名玉環印
